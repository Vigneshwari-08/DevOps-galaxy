name: Build Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-galaxy .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-galaxy

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop galaxy || true
          docker rm galaxy || true
          docker pull ${{ secrets.DOCKER_USERNAME }}/devops-galaxy
          docker run -d -p 80:80 --name galaxy ${{ secrets.DOCKER_USERNAME }}/devops-galaxy